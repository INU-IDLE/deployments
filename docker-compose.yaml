services:
  postgres:
    image: postgres:16
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rushcutter-network
    healthcheck:
      test:
        ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend-server
      dockerfile: Dockerfile
    container_name: rushcutter-backend
    restart: always
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - rushcutter-network

  congestion-api:
    build:
      context: ./congestion-server
      dockerfile: Dockerfile
    container_name: congestion-api
    restart: always
    ports:
      - "8000:8000"
    networks:
      - rushcutter-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: rushcutter-nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - rushcutter-network

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - rushcutter-network

volumes:
  postgres_data:

networks:
  rushcutter-network:
    driver: bridge
